---
# Namespace — ak ešte neexistuje
apiVersion: v1
kind: Namespace
metadata:
  name: app
---
# Deployment — dummy app (fake-service)
# Generuje Prometheus metriky na :9100/metrics a JSON logy na stdout.
# Pre reálnu Spring Boot appku: zmeň image + port na 8080 / path na /actuator/prometheus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummy-app
  namespace: app
  labels:
    app: dummy-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dummy-app
  template:
    metadata:
      labels:
        app: dummy-app
      annotations:
        # Alloy sleduje tieto anotácie a automaticky scrape-uje pod
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: dummy-app
          image: nicholasjackson/fake-service:v0.26.2
          env:
            - name: NAME
              value: "dummy-app"
            - name: MESSAGE
              value: "Hello from dummy-app!"
            - name: LISTEN_ADDR
              value: "0.0.0.0:8080"
            - name: LOG_FORMAT
              value: "json"
            - name: LOG_LEVEL
              value: "info"
          ports:
            - name: http
              containerPort: 8080
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
        # Sidecar: exposes Prometheus metriky na :9100/metrics
        - name: node-exporter
          image: prom/node-exporter:v1.7.0
          args:
            - "--web.listen-address=:9100"
          ports:
            - name: metrics
              containerPort: 9100
          resources:
            limits:
              cpu: 50m
              memory: 32Mi
            requests:
              cpu: 10m
              memory: 16Mi
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: dummy-app
  namespace: app
spec:
  selector:
    app: dummy-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9100
      targetPort: 9100
