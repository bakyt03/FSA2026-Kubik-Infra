# =============================================================================
# Kubernetes Secrets — FullStackAcademy Workshop
#
# Pouzitie:
#   op inject -i 02-secrets.tpl.yaml | kubectl apply -f -
#
# Hodnoty su nacitavane z 1Password (vault: FullStackAcademy).
# =============================================================================

# -----------------------------------------------------------------------------
# APP — PostgreSQL + Keycloak
# -----------------------------------------------------------------------------

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: app
type: Opaque
stringData:
  db_url: "{{ op://FullStackAcademy/FSA - PSQL/server }}"
  db_username: "{{ op://FullStackAcademy/FSA - PSQL/username }}"
  db_password: "{{ op://FullStackAcademy/FSA - PSQL/password }}"

---

apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: app
type: Opaque
stringData:
  kc_username: "{{ op://FullStackAcademy/FSA - Keycloak admin/username }}"
  kc_password: "{{ op://FullStackAcademy/FSA - Keycloak admin/password }}"

---

# -----------------------------------------------------------------------------
# GITLAB — root heslo + Azure SP pre SSO + Runner token
# -----------------------------------------------------------------------------

apiVersion: v1
kind: Secret
metadata:
  name: gitlab-secret
  namespace: infra
type: Opaque
stringData:
  password: "{{ op://FullStackAcademy/FSA - GitLab root/password }}"

---

apiVersion: v1
kind: Secret
metadata:
  name: gitlab-azure-secret
  namespace: infra
type: Opaque
stringData:
  tenant_id: "{{ op://FullStackAcademy/FSA - GitLab SP/Tenant ID }}"
  client_id: "{{ op://FullStackAcademy/FSA - GitLab SP/Application ID }}"
  client_secret: "{{ op://FullStackAcademy/FSA - GitLab SP/Client Secret Value }}"

---

apiVersion: v1
kind: Secret
metadata:
  name: gitlab-runner-secret
  namespace: infra
type: Opaque
stringData:
  runner-token: "{{ op://FullStackAcademy/FSA - GitLab Runner token/Token }}"
  runner-registration-token: ""

---

# -----------------------------------------------------------------------------
# Grafana admin credentials
# -----------------------------------------------------------------------------

apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: monitoring
type: Opaque
stringData:
  username: "{{ op://FullStackAcademy/FSA - Grafana admin/username }}"
  password: "{{ op://FullStackAcademy/FSA - Grafana admin/password }}"
